<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Japan 2026 — Trip Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:#333;--text:#e8e4df;--text-muted:#8a8580;--accent:#e74c3c;--accent-soft:rgba(231,76,60,.15);--gold:#c9a96e;--gold-soft:rgba(201,169,110,.15);--sakura:#f2a6b3;--sakura-soft:rgba(242,166,179,.12)}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-text-size-adjust:100%}
.header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#1a1a1a,#0f0f0f);position:sticky;top:0;z-index:1000}
.header-left{display:flex;align-items:center;gap:12px}
.logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;letter-spacing:-.5px}
.logo span{color:var(--accent)}
.header-subtitle{color:var(--text-muted);font-size:11px;font-weight:300;letter-spacing:2px;text-transform:uppercase}
.header-dates{display:flex;gap:6px;align-items:center;color:var(--text-muted);font-size:12px}
.header-dates .dot{width:4px;height:4px;border-radius:50%;background:var(--accent)}
.app-layout{display:flex;height:calc(100vh - 57px)}
.sidebar{width:420px;min-width:420px;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.day-tabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--surface);scrollbar-width:none;-webkit-overflow-scrolling:touch}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{padding:12px 14px;cursor:pointer;white-space:nowrap;font-size:11px;font-weight:500;color:var(--text-muted);border-bottom:2px solid transparent;transition:all .2s;text-transform:uppercase;letter-spacing:1px;user-select:none;-webkit-tap-highlight-color:transparent}
.day-tab:hover{color:var(--text);background:var(--surface2)}
.day-tab.active{color:var(--accent);border-bottom-color:var(--accent);background:var(--accent-soft)}
.day-tab.dragging{opacity:.5}
.day-tab.drag-over{border-left:2px solid var(--accent)}
.search-bar{padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface);position:relative}
.search-input-wrap{display:flex;gap:6px;align-items:center}
.search-input-wrap input{flex:1;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;outline:none}
.search-input-wrap input:focus{border-color:var(--accent)}
.search-input-wrap input::placeholder{color:var(--text-muted)}
.search-input-wrap button{padding:9px 14px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;white-space:nowrap}
.search-results{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border);border-top:none;max-height:350px;overflow-y:auto;z-index:500;display:none;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.search-results.visible{display:block}
.search-result-item{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;gap:10px;align-items:center}
.search-result-item:hover,.search-result-item:active{background:var(--surface2)}
.search-result-icon{width:32px;height:32px;border-radius:8px;background:var(--gold-soft);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.search-result-icon.food-icon{background:var(--sakura-soft);color:var(--sakura)}
.search-result-icon.area-icon{background:rgba(100,180,255,.12);color:#64b4ff}
.search-result-info{flex:1;min-width:0}
.search-result-name{font-weight:500;font-size:13px;margin-bottom:1px}
.search-result-addr{color:var(--text-muted);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-result-type{color:var(--gold);font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-top:1px}
.search-result-add{padding:5px 10px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:10px;font-weight:500;white-space:nowrap;flex-shrink:0}
.search-loading,.search-empty{padding:16px;color:var(--text-muted);font-size:13px;text-align:center}
.stations-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.day-header{padding:16px 16px 8px;display:flex;justify-content:space-between;align-items:center}
.day-header h2{font-family:'Playfair Display',serif;font-size:18px;font-weight:700}
.day-header .day-date{color:var(--text-muted);font-size:11px;letter-spacing:1px}
.day-note{padding:0 16px 12px;color:var(--text-muted);font-size:12px;font-style:italic;line-height:1.4}
.station-card{padding:12px 16px;border-bottom:1px solid var(--border);transition:background .15s;display:flex;gap:10px;align-items:flex-start}
.station-card:active{background:var(--surface)}
.station-card.active-station{background:var(--accent-soft);border-left:3px solid var(--accent)}
.station-number{width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px}
.station-info{flex:1;min-width:0}
.station-name{font-weight:500;font-size:13px;margin-bottom:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.type-badge{font-size:9px;padding:2px 5px;border-radius:3px;font-weight:400;text-transform:uppercase;letter-spacing:.5px}
.type-badge.sight{background:var(--gold-soft);color:var(--gold)}
.type-badge.food{background:var(--sakura-soft);color:var(--sakura)}
.type-badge.area{background:rgba(100,180,255,.12);color:#64b4ff}
.type-badge.transport{background:rgba(100,200,150,.12);color:#64c896}
.station-time{color:var(--text-muted);font-size:11px;margin-bottom:3px}
.station-note{color:var(--text-muted);font-size:11px;line-height:1.3}
.station-actions{display:flex;gap:3px;flex-shrink:0;flex-direction:column;align-items:center}
.station-actions-row{display:flex;gap:3px}
.sbtn{background:none;border:1px solid var(--border);color:var(--text-muted);width:26px;height:26px;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s;-webkit-tap-highlight-color:transparent;padding:0}
.sbtn:active{background:var(--surface2);color:var(--text)}
.sbtn.delete:active{background:var(--accent-soft);color:var(--accent)}
.sbtn.dis{opacity:.15;pointer-events:none}
.stay-badge{display:inline-flex;align-items:center;gap:3px;background:rgba(100,200,150,.12);color:#64c896;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:500}
.travel-segment{padding:3px 16px 3px 52px;display:flex;align-items:center;gap:6px;color:var(--text-muted);font-size:10px;background:var(--bg);border-bottom:1px solid rgba(51,51,51,.4);min-height:26px}
.travel-segment .travel-line{width:2px;height:16px;background:var(--border);flex-shrink:0;margin-right:8px}
.travel-icon{font-size:12px;flex-shrink:0}
.travel-detail{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.travel-dist{color:var(--gold)}
.travel-time{color:var(--sakura)}
.travel-mode{color:#64b4ff}
.day-summary{padding:10px 16px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:center;font-size:11px;flex-wrap:wrap}
.day-summary-item{display:flex;align-items:center;gap:3px}
.day-summary-item.total-dist{color:var(--gold)}
.day-summary-item.total-time{color:var(--sakura)}
.day-summary-item.total-walk{color:#64c896}
.map-container{flex:1;position:relative}
#map{width:100%;height:100%}
.custom-marker{background:var(--accent);color:#fff;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,.4);border:2px solid #fff}
.custom-marker.food-marker{background:var(--sakura)}
.custom-marker.area-marker{background:#64b4ff}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:2000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;width:460px;max-width:92vw;max-height:85vh;overflow-y:auto}
.modal h3{font-family:'Playfair Display',serif;font-size:17px;margin-bottom:16px}
.modal label{display:block;font-size:11px;color:var(--text-muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:1px}
.modal input,.modal select,.modal textarea{width:100%;padding:9px 11px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;margin-bottom:14px;outline:none}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--accent)}
.modal textarea{resize:vertical;min-height:50px}
.modal-buttons{display:flex;gap:8px;justify-content:flex-end;margin-top:6px}
.modal-buttons button{padding:9px 18px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;border:1px solid var(--border)}
.btn-cancel{background:transparent;color:var(--text-muted)}
.btn-save{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-delete-modal{background:transparent;color:var(--accent);border-color:var(--accent);margin-right:auto}
.export-bar{padding:10px 16px;border-top:1px solid var(--border);background:var(--surface);display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.export-bar button{padding:7px 12px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:500;border:1px solid var(--border);background:transparent;color:var(--text-muted)}
.export-bar .add-btn{background:var(--accent);color:#fff;border-color:var(--accent)}
.sync-status{margin-left:auto;font-size:10px;color:var(--text-muted)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:#27ae60;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:3000;opacity:0;transition:all .3s;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.4);white-space:nowrap}
.toast.visible{opacity:1;transform:translateX(-50%) translateY(0)}
.leaflet-popup-content-wrapper{background:var(--surface)!important;color:var(--text)!important;border-radius:8px!important;box-shadow:0 4px 20px rgba(0,0,0,.5)!important}
.leaflet-popup-content{margin:10px 14px!important;font-family:'Noto Sans JP',sans-serif!important;font-size:12px!important}
.leaflet-popup-tip{background:var(--surface)!important}
.popup-title{font-weight:700;font-size:13px;margin-bottom:3px}
.popup-time{color:var(--gold);font-size:11px}
.popup-note{color:var(--text-muted);font-size:11px;margin-top:3px}

/* MOBILE VIEW TOGGLE */
.mobile-toggle{display:none;border-bottom:1px solid var(--border);background:var(--surface)}
.mobile-toggle-inner{display:flex}
.mobile-toggle-btn{flex:1;padding:10px;text-align:center;font-size:12px;font-weight:500;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;text-transform:uppercase;letter-spacing:1px;-webkit-tap-highlight-color:transparent}
.mobile-toggle-btn.active{color:var(--accent);border-bottom-color:var(--accent);background:var(--accent-soft)}

@media(max-width:768px){
  .header{padding:12px 16px}
  .logo{font-size:18px}
  .header-subtitle{font-size:10px;letter-spacing:1px}
  .header-dates{display:none}
  .app-layout{flex-direction:column;height:calc(100vh - 49px)}
  .sidebar{width:100%;min-width:100%;height:100%;display:flex;flex-direction:column}
  .map-container{position:absolute;inset:0;top:49px;z-index:1}
  .mobile-toggle{display:block;position:relative;z-index:10}
  .sidebar.map-active{height:auto;flex:0 0 auto}
  .sidebar.map-active .stations-list,
  .sidebar.map-active .export-bar,
  .sidebar.map-active .search-bar{display:none}
  .sidebar.list-active .stations-list,
  .sidebar.list-active .export-bar,
  .sidebar.list-active .search-bar{display:flex}
  .sidebar.list-active+.map-container{display:none}
  .map-container.mobile-map-visible{display:block;position:relative;flex:1;min-height:0}
  .map-container.mobile-map-hidden{display:none}
  .search-bar{display:block!important}
  .stations-list{display:block!important}
  .export-bar{display:flex!important}
}
</style>
</head>
<body>
<div class="header">
<div class="header-left"><div><div class="logo">Japan <span>2026</span></div><div class="header-subtitle">Trip Planner</div></div></div>
<div class="header-dates"><span>7.&ndash;17. April</span><div class="dot"></div><span>Tokyo &#8594; Kyoto &#8594; Tokyo</span></div>
</div>
<div class="app-layout">
<div class="sidebar" id="sidebar">
<div class="day-tabs" id="dayTabs"></div>
<div class="mobile-toggle"><div class="mobile-toggle-inner"><div class="mobile-toggle-btn active" id="togList" onclick="setMobileView('list')">&#128203; Liste</div><div class="mobile-toggle-btn" id="togMap" onclick="setMobileView('map')">&#128506; Karte</div></div></div>
<div class="search-bar" id="searchBar">
<div class="search-input-wrap">
<input type="text" id="searchInput" placeholder="Ort suchen..." autocomplete="off">
<button id="searchBtn">Suchen</button>
</div>
<div class="search-results" id="searchResults"></div>
</div>
<div class="stations-list" id="stationsList"></div>
<div class="export-bar" id="exportBar">
<button class="add-btn" id="addStationBtn">+ Manuell</button>
<button id="syncPushBtn" style="background:var(--gold);color:#000;border-color:var(--gold)">&#8593; Sync</button>
<button id="syncPullBtn">&#8595; Laden</button>
<button id="exportBtn">Export</button>
<button id="importBtn">Import</button>
<input type="file" id="importFile" accept=".json" style="display:none">
<span class="sync-status" id="syncStatus"></span>
</div>
</div>
<div class="map-container" id="mapContainer"><div id="map"></div></div>
</div>
<div class="modal-overlay" id="modalOverlay" style="display:none"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

// MOVE STATION
function moveStation(i,dir){

  if(t<0||t>=day.stations.length)return;

// SEARCH (Photon API)
var searchData=[];
async function searchPlaces(q){
  var r=document.getElementById('searchResults');
  r.innerHTML='<div class="search-loading">Suche...</div>';
  r.classList.add('visible');
  try{
    var url='https://photon.komoot.io/api/?q='+encodeURIComponent(q)+' Japan&limit=8&lang=en&lat=35.68&lon=139.77';
    var resp=await fetch(url);var data=await resp.json();var results=data.features||[];
    if(results.length===0){
      var resp2=await fetch('https://photon.komoot.io/api/?q='+encodeURIComponent(q)+'&limit=8&lang=en&lat=35.68&lon=139.77');
      var data2=await resp2.json();results=data2.features||[];
    }
    searchData=results;
    if(results.length===0){r.innerHTML='<div class="search-empty">Keine Ergebnisse.</div>';return}
    r.innerHTML=results.map(function(f,i){
      var p=f.properties||{},g=f.geometry||{},coords=g.coordinates||[0,0];
      var pt=classifyPhoton(p);
      var ic=pt==='food'?'food-icon':pt==='area'?'area-icon':'';
      var sym=pt==='food'?'&#127860;':pt==='sight'?'&#9961;':pt==='transport'?'&#128651;':'&#128205;';
      var tl=pt==='food'?'Essen':pt==='sight'?'Sight':pt==='transport'?'Transport':'Gegend';
      var nm=p.name||'?';
      var parts=[];if(p.street)parts.push(p.street);if(p.district)parts.push(p.district);if(p.city)parts.push(p.city);
      return '<div class="search-result-item" onclick="addSearchResult('+i+')"><div class="search-result-icon '+ic+'">'+sym+'</div><div class="search-result-info"><div class="search-result-name">'+nm+'</div><div class="search-result-addr">'+parts.join(', ')+'</div><div class="search-result-type">'+tl+'</div></div><button class="search-result-add" onclick="event.stopPropagation();addSearchResult('+i+')">+ Tag '+(activeDay+1)+'</button></div>';
    }).join('');
  }catch(e){r.innerHTML='<div class="search-empty">Fehler.</div>'}
}
function classifyPhoton(p){
  var v=(p.osm_value||'').toLowerCase(),k=(p.osm_key||'').toLowerCase();
  if(['restaurant','cafe','fast_food','bar','pub','bakery','ice_cream','food_court','biergarten'].indexOf(v)>=0)return 'food';
  if(k==='cuisine')return 'food';
  if(['temple','shrine','museum','castle','monument','memorial','viewpoint','attraction','theme_park','zoo','garden','artwork','gallery','park','archaeological_site','ruins'].indexOf(v)>=0)return 'sight';
  if(k==='tourism'||k==='historic')return 'sight';if(v==='place_of_worship')return 'sight';
  if(['station','bus_stop','aerodrome','airport','halt','tram_stop'].indexOf(v)>=0)return 'transport';
  if(k==='railway'||k==='aeroway')return 'transport';
  return 'area';
}
function addSearchResult(i){
  var f=searchData[i];if(!f)return;
  var p=f.properties||{},coords=(f.geometry||{}).coordinates||[0,0];
  var pt=classifyPhoton(p),nm=p.name||'?';
  var parts=[];if(p.street)parts.push(p.street);if(p.district)parts.push(p.district);if(p.city)parts.push(p.city);
  state.days[activeDay].stations.push({id:'s'+Date.now(),name:nm,time:'',type:pt,lat:coords[1],lng:coords[0],note:parts.join(', ')});
  saveState();render();
  document.getElementById('searchResults').classList.remove('visible');
  document.getElementById('searchInput').value='';
  showToast('\u2713 '+nm+' hinzugef\u00fcgt');
}

// MAP
function initMap(){
  map=L.map('map',{zoomControl:true,attributionControl:false}).setView([35.6812,139.7671],12);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);
  markersLayer=L.layerGroup().addTo(map);routeLayer=L.layerGroup().addTo(map);renderMap();
}
function renderMap(){
  markersLayer.clearLayers();routeLayer.clearLayers();
  var day=state.days[activeDay];if(!day)return;var coords=[];
  day.stations.forEach(function(s,i){
    if(!s.lat||!s.lng)return;
    var mc=s.type==='food'?'food-marker':s.type==='area'?'area-marker':'';
    var icon=L.divIcon({className:'',html:'<div class="custom-marker '+mc+'">'+(i+1)+'</div>',iconSize:[26,26],iconAnchor:[13,13]});
    L.marker([s.lat,s.lng],{icon:icon}).bindPopup('<div class="popup-title">'+s.name+'</div><div class="popup-time">'+(s.time||'')+'</div><div class="popup-note">'+(s.note||'')+'</div>').on('click',function(){activeStation=s.id;renderStations()}).addTo(markersLayer);
    coords.push([s.lat,s.lng]);
  });
  if(coords.length>1)L.polyline(coords,{color:'#e74c3c',weight:2,opacity:.5,dashArray:'8 6'}).addTo(routeLayer);
  if(coords.length>0)map.fitBounds(coords,{padding:[50,50],maxZoom:14});
}

function renderDayTabs(){

  }).join('');
}

function haversine(a,b,c,d){var R=6371,dL=(c-a)*Math.PI/180,dN=(d-b)*Math.PI/180;var x=Math.sin(dL/2)*Math.sin(dL/2)+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dN/2)*Math.sin(dN/2);return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}
function estimateTravel(km){
  if(km<.1)return{icon:'\ud83d\udeb6',modeLabel:'Laufen',timeMin:1,walkDist:km};
  if(km<1.5)return{icon:'\ud83d\udeb6',modeLabel:'Laufen',timeMin:Math.round(km/.07),walkDist:km};
  if(km<5)return{icon:'\ud83d\ude87',modeLabel:'U-Bahn',timeMin:Math.round(5+km/.5),walkDist:Math.min(km,.8)};
  if(km<30)return{icon:'\ud83d\ude83',modeLabel:'Bahn',timeMin:Math.round(8+km/.8),walkDist:.5};
  if(km<100)return{icon:'\ud83d\ude85',modeLabel:'Shinkansen',timeMin:Math.round(15+km/2.5),walkDist:.3};
  return{icon:'\ud83d\ude85',modeLabel:'Shinkansen',timeMin:Math.round(20+km/3.5),walkDist:.3};
}
function parseTime(t){if(!t)return null;var m=t.match(/(\d{1,2}):(\d{2})/);return m?parseInt(m[1])*60+parseInt(m[2]):null}
function formatMin(m){if(m<60)return m+'min';var h=Math.floor(m/60),r=m%60;return r>0?h+'h '+r+'m':h+'h'}
function formatDist(km){return km<1?Math.round(km*1000)+'m':km.toFixed(1)+'km'}

function renderStations(){
  var list=document.getElementById('stationsList'),day=state.days[activeDay];
  if(!day){list.innerHTML='';return}
  var h='<div class="day-header"><h2>'+day.title+'</h2><span class="day-date">'+day.date+' \u00b7 '+day.city+'</span></div>';
  if(day.note)h+='<div class="day-note">'+day.note+'</div>';
  var segs=[],tD=0,tW=0,tT=0;
  for(var i=0;i<day.stations.length;i++){
    var s=day.stations[i],nx=day.stations[i+1];
    if(nx&&s.lat&&s.lng&&nx.lat&&nx.lng){
      var d=haversine(s.lat,s.lng,nx.lat,nx.lng),tr=estimateTravel(d);
      tD+=d;tW+=tr.walkDist;tT+=tr.timeMin;
      var t1=parseTime(s.time),t2=parseTime(nx.time),stay=null;
      if(t1!==null&&t2!==null)stay=Math.max(0,(t2-t1)-tr.timeMin);
      segs.push({dist:d,travel:tr,stayMin:stay});
    }else{segs.push(null)}
  }
  if(day.stations.length>1){
    h+='<div class="day-summary"><div class="day-summary-item total-dist">\ud83d\udccd '+formatDist(tD)+'</div><div class="day-summary-item total-time">\u23f1 '+formatMin(tT)+' unterwegs</div><div class="day-summary-item total-walk">\ud83d\udeb6 '+formatDist(tW)+' zu Fu\u00df</div></div>';
  }
  var len=day.stations.length;
  day.stations.forEach(function(s,i){
    var tl=s.type==='sight'?'Sight':s.type==='food'?'Food':s.type==='transport'?'Transfer':'Area';
    var ac=activeStation===s.id?' active-station':'';
    var stH='';if(segs[i]&&segs[i].stayMin!==null&&segs[i].stayMin>0)stH=' <span class="stay-badge">\u23f3 '+formatMin(segs[i].stayMin)+'</span>';
    h+='<div class="station-card'+ac+'" onclick="focusStation(\''+s.id+'\','+s.lat+','+s.lng+')">';
    h+='<div class="station-number">'+(i+1)+'</div>';
    h+='<div class="station-info"><div class="station-name">'+s.name+' <span class="type-badge '+s.type+'">'+tl+'</span>'+stH+'</div>';
    if(s.time)h+='<div class="station-time">\u23f0 '+s.time+'</div>';
    if(s.note)h+='<div class="station-note">'+s.note+'</div>';
    h+='</div>';
    h+='<div class="station-actions">';
    h+='<div class="station-actions-row">';
    h+='<button class="sbtn'+(i===0?' dis':'')+'" onclick="event.stopPropagation();moveStation('+i+',-1)" title="Hoch">\u25b2</button>';
    h+='<button class="sbtn'+(i===len-1?' dis':'')+'" onclick="event.stopPropagation();moveStation('+i+',1)" title="Runter">\u25bc</button>';
    h+='</div><div class="station-actions-row">';
    h+='<button class="sbtn" onclick="event.stopPropagation();editStation('+i+')" title="Bearbeiten">\u270e</button>';
    h+='<button class="sbtn delete" onclick="event.stopPropagation();deleteStation('+i+')" title="L\u00f6schen">\u00d7</button>';
    h+='</div></div></div>';
    if(segs[i]&&segs[i].travel){
      var sg=segs[i];
      h+='<div class="travel-segment"><div class="travel-line"></div><div class="travel-icon">'+sg.travel.icon+'</div><div class="travel-detail"><span class="travel-dist">'+formatDist(sg.dist)+'</span><span class="travel-time">\u2248'+formatMin(sg.travel.timeMin)+'</span><span class="travel-mode">'+sg.travel.modeLabel+'</span></div></div>';
    }
  });
  list.innerHTML=h;
}
function render(){renderDayTabs();renderStations();renderMap()}
function selectDay(i){activeDay=i;activeStation=null;render();if(mobileView==='map')setTimeout(function(){map.invalidateSize()},50)}
function focusStation(id,lat,lng){
  activeStation=id;renderStations();

  }
}

function saveEdit(i){
  var s=state.days[activeDay].stations[i];
  s.name=document.getElementById('editName').value;s.time=document.getElementById('editTime').value;
  s.type=document.getElementById('editType').value;s.lat=parseFloat(document.getElementById('editLat').value)||s.lat;
  s.lng=parseFloat(document.getElementById('editLng').value)||s.lng;s.note=document.getElementById('editNote').value;
  var mv=document.getElementById('editMoveDay').value;
  if(mv!==''){state.days[activeDay].stations.splice(i,1);state.days[parseInt(mv)].stations.push(s)}
  hideModal();saveState();render();
}
function deleteStation(i){if(!confirm('L\u00f6schen?'))return;state.days[activeDay].stations.splice(i,1);saveState();render()}

});
function addManual(){

document.getElementById('exportBtn').addEventListener('click',function(){var b=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='japan-2026-trip.json';a.click()});

// GITHUB LIVE SYNC
var GH_TOKEN='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';
var GH_REPO='PJOrab/Japan-2026';
var GH_FILE='data.json';
var ghSha=null;
var syncStat=document.getElementById('syncStatus');

async function syncPull(){
  syncStat.textContent='\u231b Lade...';
  try{
    var resp=await fetch('https://api.github.com/repos/'+GH_REPO+'/contents/'+GH_FILE,{
      headers:{'Authorization':'token '+GH_TOKEN,'Accept':'application/vnd.github.v3+json'}
    });
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    var meta=await resp.json();
    ghSha=meta.sha;
    var content=atob(meta.content.replace(/\n/g,''));
    var data=JSON.parse(content);
    if(data.days&&data.days.length>0){
      state=data;activeDay=0;saveState();render();
      syncStat.textContent='\u2713 Geladen';
      setTimeout(function(){syncStat.textContent=''},3000);
    }
  }catch(e){
    syncStat.textContent='\u2717 Fehler';
    console.error('Pull failed:',e);
    setTimeout(function(){syncStat.textContent=''},3000);
  }
}

async function syncPush(){
  syncStat.textContent='\u231b Speichere...';
  try{
    // Get current SHA first
    var metaResp=await fetch('https://api.github.com/repos/'+GH_REPO+'/contents/'+GH_FILE,{
      headers:{'Authorization':'token '+GH_TOKEN,'Accept':'application/vnd.github.v3+json'}
    });
    if(metaResp.ok){var m=await metaResp.json();ghSha=m.sha}

    var content=btoa(unescape(encodeURIComponent(JSON.stringify(state,null,2))));
    var body={message:'sync: update trip data',content:content};
    if(ghSha)body.sha=ghSha;

    var resp=await fetch('https://api.github.com/repos/'+GH_REPO+'/contents/'+GH_FILE,{
      method:'PUT',
      headers:{'Authorization':'token '+GH_TOKEN,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'},
      body:JSON.stringify(body)
    });
    if(!resp.ok){var err=await resp.json();throw new Error(err.message||'HTTP '+resp.status)}
    var result=await resp.json();
    ghSha=result.content.sha;
    syncStat.textContent='\u2713 Gespeichert';
    showToast('\u2713 Sync: Daten f\u00fcr alle gespeichert');
    setTimeout(function(){syncStat.textContent=''},3000);
  }catch(e){
    syncStat.textContent='\u2717 Fehler: '+e.message;
    console.error('Push failed:',e);
    setTimeout(function(){syncStat.textContent=''},5000);
  }
}

document.getElementById('syncPushBtn').addEventListener('click',syncPush);
document.getElementById('syncPullBtn').addEventListener('click',syncPull);

initMap();render();
syncPull();
