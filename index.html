<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japan 2026 — Trip Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
--bg: #0f0f0f;
--surface: #1a1a1a;
--surface2: #242424;
--border: #333;
--text: #e8e4df;
--text-muted: #8a8580;
--accent: #e74c3c;
--accent-soft: rgba(231, 76, 60, 0.15);
--gold: #c9a96e;
--gold-soft: rgba(201, 169, 110, 0.15);
--sakura: #f2a6b3;
--sakura-soft: rgba(242, 166, 179, 0.12);
}

body {
font-family: ‘Noto Sans JP’, sans-serif;
background: var(–bg);
color: var(–text);
min-height: 100vh;
overflow-x: hidden;
}

/* Header */
.header {
padding: 24px 32px;
display: flex;
align-items: center;
justify-content: space-between;
border-bottom: 1px solid var(–border);
background: linear-gradient(180deg, #1a1a1a 0%, #0f0f0f 100%);
position: sticky;
top: 0;
z-index: 1000;
}

.header-left {
display: flex;
align-items: center;
gap: 16px;
}

.logo {
font-family: ‘Playfair Display’, serif;
font-size: 24px;
font-weight: 700;
color: var(–text);
letter-spacing: -0.5px;
}

.logo span {
color: var(–accent);
}

.header-subtitle {
color: var(–text-muted);
font-size: 13px;
font-weight: 300;
letter-spacing: 2px;
text-transform: uppercase;
}

.header-dates {
display: flex;
gap: 8px;
align-items: center;
color: var(–text-muted);
font-size: 13px;
}

.header-dates .dot {
width: 4px;
height: 4px;
border-radius: 50%;
background: var(–accent);
}

/* Layout */
.app-layout {
display: flex;
height: calc(100vh - 73px);
}

/* Sidebar */
.sidebar {
width: 420px;
min-width: 420px;
border-right: 1px solid var(–border);
display: flex;
flex-direction: column;
overflow: hidden;
}

/* Day Tabs */
.day-tabs {
display: flex;
gap: 0;
overflow-x: auto;
border-bottom: 1px solid var(–border);
background: var(–surface);
scrollbar-width: none;
}

.day-tabs::-webkit-scrollbar { display: none; }

.day-tab {
padding: 14px 16px;
cursor: pointer;
white-space: nowrap;
font-size: 12px;
font-weight: 500;
color: var(–text-muted);
border-bottom: 2px solid transparent;
transition: all 0.2s;
text-transform: uppercase;
letter-spacing: 1px;
position: relative;
user-select: none;
}

.day-tab:hover { color: var(–text); background: var(–surface2); }

.day-tab.active {
color: var(–accent);
border-bottom-color: var(–accent);
background: var(–accent-soft);
}

.day-tab.dragging {
opacity: 0.5;
background: var(–accent-soft);
}

.day-tab.drag-over {
border-left: 2px solid var(–accent);
}

/* Stations List */
.stations-list {
flex: 1;
overflow-y: auto;
padding: 0;
scrollbar-width: thin;
scrollbar-color: var(–border) transparent;
}

.day-header {
padding: 20px 24px 12px;
display: flex;
justify-content: space-between;
align-items: center;
}

.day-header h2 {
font-family: ‘Playfair Display’, serif;
font-size: 20px;
font-weight: 700;
}

.day-header .day-date {
color: var(–text-muted);
font-size: 12px;
letter-spacing: 1px;
}

.day-note {
padding: 0 24px 16px;
color: var(–text-muted);
font-size: 13px;
font-style: italic;
line-height: 1.5;
}

/* Station Card */
.station-card {
padding: 16px 24px;
border-bottom: 1px solid var(–border);
cursor: grab;
transition: background 0.15s;
position: relative;
display: flex;
gap: 14px;
align-items: flex-start;
}

.station-card:hover {
background: var(–surface);
}

.station-card.dragging {
opacity: 0.4;
background: var(–accent-soft);
}

.station-card.drag-over-card {
border-top: 2px solid var(–accent);
}

.station-card.active-station {
background: var(–accent-soft);
border-left: 3px solid var(–accent);
}

.station-number {
width: 28px;
height: 28px;
border-radius: 50%;
background: var(–accent);
color: white;
display: flex;
align-items: center;
justify-content: center;
font-size: 12px;
font-weight: 700;
flex-shrink: 0;
margin-top: 2px;
}

.station-info { flex: 1; min-width: 0; }

.station-name {
font-weight: 500;
font-size: 14px;
margin-bottom: 4px;
display: flex;
align-items: center;
gap: 8px;
}

.station-name .type-badge {
font-size: 10px;
padding: 2px 6px;
border-radius: 3px;
font-weight: 400;
text-transform: uppercase;
letter-spacing: 0.5px;
}

.type-badge.sight { background: var(–gold-soft); color: var(–gold); }
.type-badge.food { background: var(–sakura-soft); color: var(–sakura); }
.type-badge.area { background: rgba(100,180,255,0.12); color: #64b4ff; }
.type-badge.transport { background: rgba(100,200,150,0.12); color: #64c896; }

.station-time {
color: var(–text-muted);
font-size: 12px;
margin-bottom: 4px;
}

.station-note {
color: var(–text-muted);
font-size: 12px;
line-height: 1.4;
}

.station-actions {
display: flex;
gap: 4px;
flex-shrink: 0;
opacity: 0;
transition: opacity 0.15s;
}

.station-card:hover .station-actions { opacity: 1; }

.station-actions button {
background: none;
border: 1px solid var(–border);
color: var(–text-muted);
width: 28px;
height: 28px;
border-radius: 4px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
font-size: 14px;
transition: all 0.15s;
}

.station-actions button:hover {
background: var(–surface2);
color: var(–text);
border-color: var(–text-muted);
}

.station-actions button.delete:hover {
background: var(–accent-soft);
color: var(–accent);
border-color: var(–accent);
}

/* Map */
.map-container {
flex: 1;
position: relative;
}

#map {
width: 100%;
height: 100%;
}

/* Custom map markers */
.custom-marker {
background: var(–accent);
color: white;
width: 28px;
height: 28px;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
font-size: 12px;
font-weight: 700;
box-shadow: 0 2px 8px rgba(0,0,0,0.4);
border: 2px solid white;
}

.custom-marker.food-marker { background: var(–sakura); }
.custom-marker.area-marker { background: #64b4ff; }

/* Modal */
.modal-overlay {
position: fixed;
inset: 0;
background: rgba(0,0,0,0.7);
z-index: 2000;
display: flex;
align-items: center;
justify-content: center;
backdrop-filter: blur(4px);
}

.modal {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 12px;
padding: 28px;
width: 440px;
max-width: 90vw;
max-height: 80vh;
overflow-y: auto;
}

.modal h3 {
font-family: ‘Playfair Display’, serif;
font-size: 18px;
margin-bottom: 20px;
}

.modal label {
display: block;
font-size: 12px;
color: var(–text-muted);
margin-bottom: 6px;
text-transform: uppercase;
letter-spacing: 1px;
}

.modal input, .modal select, .modal textarea {
width: 100%;
padding: 10px 12px;
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 6px;
color: var(–text);
font-family: ‘Noto Sans JP’, sans-serif;
font-size: 14px;
margin-bottom: 16px;
outline: none;
transition: border-color 0.15s;
}

.modal input:focus, .modal select:focus, .modal textarea:focus {
border-color: var(–accent);
}

.modal textarea { resize: vertical; min-height: 60px; }

.modal-buttons {
display: flex;
gap: 8px;
justify-content: flex-end;
margin-top: 8px;
}

.modal-buttons button {
padding: 10px 20px;
border-radius: 6px;
cursor: pointer;
font-size: 13px;
font-weight: 500;
border: 1px solid var(–border);
transition: all 0.15s;
}

.btn-cancel {
background: transparent;
color: var(–text-muted);
}

.btn-cancel:hover { background: var(–surface2); color: var(–text); }

.btn-save {
background: var(–accent);
color: white;
border-color: var(–accent);
}

.btn-save:hover { background: #c0392b; }

.btn-delete-modal {
background: transparent;
color: var(–accent);
border-color: var(–accent);
margin-right: auto;
}

.btn-delete-modal:hover { background: var(–accent-soft); }

/* Export bar */
.export-bar {
padding: 12px 24px;
border-top: 1px solid var(–border);
background: var(–surface);
display: flex;
gap: 8px;
align-items: center;
}

.export-bar button {
padding: 8px 16px;
border-radius: 6px;
cursor: pointer;
font-size: 12px;
font-weight: 500;
border: 1px solid var(–border);
background: transparent;
color: var(–text-muted);
transition: all 0.15s;
}

.export-bar button:hover {
background: var(–surface2);
color: var(–text);
}

.export-bar .add-btn {
background: var(–accent);
color: white;
border-color: var(–accent);
}

.export-bar .add-btn:hover { background: #c0392b; }

/* Leaflet popup override */
.leaflet-popup-content-wrapper {
background: var(–surface) !important;
color: var(–text) !important;
border-radius: 8px !important;
box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important;
}

.leaflet-popup-content {
margin: 12px 16px !important;
font-family: ‘Noto Sans JP’, sans-serif !important;
font-size: 13px !important;
}

.leaflet-popup-tip { background: var(–surface) !important; }

.popup-title { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
.popup-time { color: var(–gold); font-size: 12px; }
.popup-note { color: var(–text-muted); font-size: 12px; margin-top: 4px; }

/* Route line */
.route-line { stroke-dasharray: 8 6; }

/* Responsive */
@media (max-width: 768px) {
.app-layout { flex-direction: column; }
.sidebar { width: 100%; min-width: 100%; height: 50vh; }
.map-container { height: 50vh; }
.header { padding: 16px; }
.logo { font-size: 18px; }
.header-dates { display: none; }
}

/* Drag ghost */
.drag-ghost {
position: fixed;
pointer-events: none;
z-index: 3000;
opacity: 0.8;
background: var(–surface);
border: 1px solid var(–accent);
border-radius: 8px;
padding: 8px 16px;
font-size: 13px;
color: var(–text);
box-shadow: 0 4px 16px rgba(0,0,0,0.5);
}

/* Add station mini form */
.add-form {
padding: 16px 24px;
border-bottom: 1px solid var(–border);
background: var(–surface2);
display: none;
}

.add-form.visible { display: block; }

.free-time-block {
padding: 16px 24px;
border-bottom: 1px solid var(–border);
display: flex;
align-items: center;
gap: 12px;
color: var(–gold);
font-size: 13px;
font-style: italic;
background: var(–gold-soft);
}

.free-time-icon { font-size: 18px; }
</style>

</head>

<div class="header">

    <div>
      <div class="logo">Japan <span>2026</span></div>

    <div class="export-bar">

      <button id="exportBtn">Export JSON</button>
      <button id="importBtn">Import</button>
      <input type="file" id="importFile" accept=".json" style="display:none">
    </div>
  </div>
  <div class="map-container">
    <div id="map"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" style="display:none">
  <div class="modal" id="modal"></div>
</div>

// ============================================================
// APP STATE
// ============================================================
let state = JSON.parse(JSON.stringify(TRIP_DATA));
let activeDay = 0;
let activeStation = null;
let map, markersLayer, routeLayer;

// Try to load from localStorage
try {
  const saved = localStorage.getItem('japan2026_trip');
  if (saved) {
    const parsed = JSON.parse(saved);
    if (parsed.days && parsed.days.length > 0) state = parsed;
  }
} catch(e) {}

function saveState() {
  try { localStorage.setItem('japan2026_trip', JSON.stringify(state)); } catch(e) {}
}

// ============================================================
// MAP SETUP
// ============================================================
function initMap() {
  map = L.map('map', {
    zoomControl: true,
    attributionControl: false
  }).setView([35.6812, 139.7671], 12);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19
  }).addTo(map);

  markersLayer = L.layerGroup().addTo(map);
  routeLayer = L.layerGroup().addTo(map);

  renderMap();
}

function renderMap() {
  markersLayer.clearLayers();
  routeLayer.clearLayers();

  const day = state.days[activeDay];
  if (!day) return;

  const coords = [];

  day.stations.forEach((s, i) => {
    if (!s.lat || !s.lng) return;

    const markerClass = s.type === 'food' ? 'food-marker' : s.type === 'area' ? 'area-marker' : '';
    const icon = L.divIcon({
      className: '',
      html: `<div class="custom-marker ${markerClass}">${i + 1}</div>`,
      iconSize: [28, 28],
      iconAnchor: [14, 14]
    });

    const marker = L.marker([s.lat, s.lng], { icon })
      .bindPopup(`
        <div class="popup-title">${s.name}</div>
        <div class="popup-time">${s.time || ''}</div>
        <div class="popup-note">${s.note || ''}</div>
      `)
      .addTo(markersLayer);

    marker.on('click', () => {
      activeStation = s.id;
      renderStations();
    });

    coords.push([s.lat, s.lng]);
  });

  if (coords.length > 1) {
    const polyline = L.polyline(coords, {
      color: '#e74c3c',
      weight: 2,
      opacity: 0.5,
      dashArray: '8 6',
      className: 'route-line'
    }).addTo(routeLayer);
  }

  if (coords.length > 0) {
    map.fitBounds(coords, { padding: [60, 60], maxZoom: 14 });
  }
}

// ============================================================
// RENDER
// ============================================================
function renderDayTabs() {
  const tabs = document.getElementById('dayTabs');
  tabs.innerHTML = state.days.map((d, i) => `
    <div class="day-tab ${i === activeDay ? 'active' : ''}"
         data-day="${i}"
         draggable="true"
         ondragstart="onDayDragStart(event, ${i})"
         ondragover="onDayDragOver(event, ${i})"
         ondragleave="onDayDragLeave(event)"
         ondrop="onDayDrop(event, ${i})"
         onclick="selectDay(${i})">
      Tag ${i + 1}
    </div>
  `).join('');
}

function renderStations() {
  const list = document.getElementById('stationsList');
  const day = state.days[activeDay];
  if (!day) { list.innerHTML = ''; return; }

  let html = `
    <div class="day-header">
      <h2>${day.title}</h2>
      <span class="day-date">${day.date} · ${day.city}</span>
    </div>
  `;

  if (day.note) {
    html += `<div class="day-note">${day.note}</div>`;
  }

  day.stations.forEach((s, i) => {
    const typeLabel = s.type === 'sight' ? 'Sight' : s.type === 'food' ? 'Food' : s.type === 'transport' ? 'Transfer' : 'Area';
    const isActive = activeStation === s.id;

    html += `
      <div class="station-card ${isActive ? 'active-station' : ''}"
           data-station="${i}"
           draggable="true"
           ondragstart="onStationDragStart(event, ${i})"
           ondragover="onStationDragOver(event, ${i})"
           ondragleave="onStationDragLeave(event)"
           ondrop="onStationDrop(event, ${i})"
           onclick="focusStation('${s.id}', ${s.lat}, ${s.lng})">
        <div class="station-number">${i + 1}</div>
        <div class="station-info">
          <div class="station-name">
            ${s.name}
            <span class="type-badge ${s.type}">${typeLabel}</span>
          </div>
          ${s.time ? `<div class="station-time">⏰ ${s.time}</div>` : ''}
          ${s.note ? `<div class="station-note">${s.note}</div>` : ''}
        </div>
        <div class="station-actions">
          <button onclick="event.stopPropagation(); editStation(${i})" title="Bearbeiten">✎</button>
          <button class="delete" onclick="event.stopPropagation(); deleteStation(${i})" title="Löschen">×</button>
        </div>
      </div>
    `;
  });

  list.innerHTML = html;
}

function render() {
  renderDayTabs();
  renderStations();
  renderMap();
}

// ============================================================
// INTERACTIONS
// ============================================================
function selectDay(i) {
  activeDay = i;
  activeStation = null;
  render();
}

function focusStation(id, lat, lng) {
  activeStation = id;
  renderStations();
  if (lat && lng) {
    map.setView([lat, lng], 15, { animate: true });
    markersLayer.eachLayer(marker => {
      const pos = marker.getLatLng();
      if (Math.abs(pos.lat - lat) < 0.0001 && Math.abs(pos.lng - lng) < 0.0001) {
        marker.openPopup();
      }
    });
  }
}

// ============================================================
// DAY DRAG & DROP (reorder days)
// ============================================================
let dragDayIndex = null;

function onDayDragStart(e, i) {
  dragDayIndex = i;
  e.dataTransfer.effectAllowed = 'move';
  e.target.classList.add('dragging');
}

function onDayDragOver(e, i) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('drag-over'));
  e.currentTarget.classList.add('drag-over');
}

function onDayDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function onDayDrop(e, targetIndex) {
  e.preventDefault();
  document.querySelectorAll('.day-tab').forEach(t => {
    t.classList.remove('dragging', 'drag-over');
  });

  if (dragDayIndex === null || dragDayIndex === targetIndex) return;

  const [moved] = state.days.splice(dragDayIndex, 1);
  state.days.splice(targetIndex, 0, moved);
  activeDay = targetIndex;
  dragDayIndex = null;
  saveState();
  render();
}

// ============================================================
// STATION DRAG & DROP (reorder within day)
// ============================================================
let dragStationIndex = null;

function onStationDragStart(e, i) {
  dragStationIndex = i;
  e.dataTransfer.effectAllowed = 'move';
  e.currentTarget.classList.add('dragging');
}

function onStationDragOver(e, i) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.station-card').forEach(c => c.classList.remove('drag-over-card'));
  e.currentTarget.classList.add('drag-over-card');
}

function onStationDragLeave(e) {
  e.currentTarget.classList.remove('drag-over-card');
}

function onStationDrop(e, targetIndex) {
  e.preventDefault();
  document.querySelectorAll('.station-card').forEach(c => {
    c.classList.remove('dragging', 'drag-over-card');
  });

  if (dragStationIndex === null || dragStationIndex === targetIndex) return;

  const day = state.days[activeDay];
  const [moved] = day.stations.splice(dragStationIndex, 1);
  day.stations.splice(targetIndex, 0, moved);
  dragStationIndex = null;
  saveState();
  render();
}

// ============================================================
// EDIT / ADD / DELETE STATION
// ============================================================
function showModal(html) {
  document.getElementById('modal').innerHTML = html;
  document.getElementById('modalOverlay').style.display = 'flex';
}

function hideModal() {
  document.getElementById('modalOverlay').style.display = 'none';
}

document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) hideModal();
});

function editStation(index) {
  const s = state.days[activeDay].stations[index];
  showModal(`
    <h3>Station bearbeiten</h3>
    <label>Name</label>
    <input id="editName" value="${s.name}">
    <label>Uhrzeit</label>
    <input id="editTime" value="${s.time || ''}">
    <label>Typ</label>
    <select id="editType">
      <option value="sight" ${s.type === 'sight' ? 'selected' : ''}>Sehenswürdigkeit</option>
      <option value="food" ${s.type === 'food' ? 'selected' : ''}>Essen</option>
      <option value="area" ${s.type === 'area' ? 'selected' : ''}>Gegend</option>
      <option value="transport" ${s.type === 'transport' ? 'selected' : ''}>Transport</option>
    </select>
    <label>Breitengrad</label>
    <input id="editLat" type="number" step="0.0001" value="${s.lat || ''}">
    <label>Längengrad</label>
    <input id="editLng" type="number" step="0.0001" value="${s.lng || ''}">
    <label>Notiz</label>
    <textarea id="editNote">${s.note || ''}</textarea>
    <label>In Tag verschieben</label>
    <select id="editMoveDay">
      <option value="">— Nicht verschieben —</option>
      ${state.days.map((d, i) => `<option value="${i}" ${i === activeDay ? 'disabled' : ''}>Tag ${i + 1}: ${d.title}</option>`).join('')}
    </select>
    <div class="modal-buttons">
      <button class="btn-delete-modal" onclick="deleteStation(${index}); hideModal();">Löschen</button>
      <button class="btn-cancel" onclick="hideModal()">Abbrechen</button>
      <button class="btn-save" onclick="saveEditStation(${index})">Speichern</button>
    </div>
  `);
}

function saveEditStation(index) {
const s = state.days[activeDay].stations[index];
s.name = document.getElementById('editName').value;
s.time = document.getElementById('editTime').value;
s.type = document.getElementById('editType').value;
s.lat = parseFloat(document.getElementById('editLat').value) || s.lat;
s.lng = parseFloat(document.getElementById('editLng').value) || s.lng;
s.note = document.getElementById('editNote').value;

const moveTo = document.getElementById('editMoveDay').value;
if (moveTo !== '') {
const targetDay = parseInt(moveTo);
state.days[activeDay].stations.splice(index, 1);
state.days[targetDay].stations.push(s);
}

hideModal();
saveState();
render();
}

function deleteStation(index) {
if (!confirm('Station löschen?')) return;
state.days[activeDay].stations.splice(index, 1);
saveState();
render();
}

document.getElementById('addStationBtn').addEventListener('click', () => {
showModal(`<h3>Neue Station hinzufügen</h3> <label>Name</label> <input id="addName" placeholder="z.B. TeamLab Borderless"> <label>Uhrzeit</label> <input id="addTime" placeholder="z.B. 14:00"> <label>Typ</label> <select id="addType"> <option value="sight">Sehenswürdigkeit</option> <option value="food">Essen</option> <option value="area">Gegend</option> <option value="transport">Transport</option> </select> <label>Breitengrad</label> <input id="addLat" type="number" step="0.0001" placeholder="35.6812"> <label>Längengrad</label> <input id="addLng" type="number" step="0.0001" placeholder="139.7671"> <label>Notiz</label> <textarea id="addNote" placeholder="Tipps, Öffnungszeiten..."></textarea> <div class="modal-buttons"> <button class="btn-cancel" onclick="hideModal()">Abbrechen</button> <button class="btn-save" onclick="addStation()">Hinzufügen</button> </div>`);
});

function addStation() {
const name = document.getElementById('addName').value.trim();
if (!name) return alert('Name ist erforderlich.');

state.days[activeDay].stations.push({
id: 's' + Date.now(),
name,
time: document.getElementById('addTime').value,
type: document.getElementById('addType').value,
lat: parseFloat(document.getElementById('addLat').value) || 0,
lng: parseFloat(document.getElementById('addLng').value) || 0,
note: document.getElementById('addNote').value
});

hideModal();
saveState();
render();
}

// ============================================================
// EXPORT / IMPORT
// ============================================================
document.getElementById('exportBtn').addEventListener('click', () => {
const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
const url = URL.createObjectURL(blob);
const a = document.createElement('a');
a.href = url;
a.download = 'japan-2026-trip.json';
a.click();
URL.revokeObjectURL(url);
});

document.getElementById('importBtn').addEventListener('click', () => {
document.getElementById('importFile').click();
});

document.getElementById('importFile').addEventListener('change', (e) => {
const file = e.target.files[0];
if (!file) return;
const reader = new FileReader();
reader.onload = (ev) => {
try {
const data = JSON.parse(ev.target.result);
if (data.days) {
state = data;
activeDay = 0;
saveState();
render();
}
} catch(err) {
alert('Ungültige JSON-Datei.');
}
};
reader.readAsText(file);
e.target.value = '';

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', (e) => {
if (e.key === 'Escape') hideModal();
if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
if (e.key === 'ArrowLeft' && activeDay > 0) selectDay(activeDay - 1);
if (e.key === 'ArrowRight' && activeDay < state.days.length - 1) selectDay(activeDay + 1);
});

// ============================================================
// INIT
// ============================================================
initMap();
render();
</script>
