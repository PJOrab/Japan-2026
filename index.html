<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japan 2026 — Trip Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:#333;--text:#e8e4df;--text-muted:#8a8580;--accent:#e74c3c;--accent-soft:rgba(231,76,60,.15);--gold:#c9a96e;--gold-soft:rgba(201,169,110,.15);--sakura:#f2a6b3;--sakura-soft:rgba(242,166,179,.12)}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.header{padding:24px 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#1a1a1a 0%,#0f0f0f 100%);position:sticky;top:0;z-index:1000}
.header-left{display:flex;align-items:center;gap:16px}
.logo{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--text);letter-spacing:-.5px}
.logo span{color:var(--accent)}
.header-subtitle{color:var(--text-muted);font-size:13px;font-weight:300;letter-spacing:2px;text-transform:uppercase}
.header-dates{display:flex;gap:8px;align-items:center;color:var(--text-muted);font-size:13px}
.header-dates .dot{width:4px;height:4px;border-radius:50%;background:var(--accent)}
.app-layout{display:flex;height:calc(100vh - 73px)}
.sidebar{width:420px;min-width:420px;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.day-tabs{display:flex;gap:0;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--surface);scrollbar-width:none}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{padding:14px 16px;cursor:pointer;white-space:nowrap;font-size:12px;font-weight:500;color:var(--text-muted);border-bottom:2px solid transparent;transition:all .2s;text-transform:uppercase;letter-spacing:1px;user-select:none}
.day-tab:hover{color:var(--text);background:var(--surface2)}
.day-tab.active{color:var(--accent);border-bottom-color:var(--accent);background:var(--accent-soft)}
.day-tab.dragging{opacity:.5}
.day-tab.drag-over{border-left:2px solid var(--accent)}
.search-bar{padding:12px 24px;border-bottom:1px solid var(--border);background:var(--surface);position:relative}
.search-input-wrap{display:flex;gap:8px;align-items:center}
.search-input-wrap input{flex:1;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;outline:none;transition:border-color .15s}
.search-input-wrap input:focus{border-color:var(--accent)}
.search-input-wrap input::placeholder{color:var(--text-muted)}
.search-input-wrap button{padding:10px 16px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;white-space:nowrap;transition:background .15s}
.search-input-wrap button:hover{background:#c0392b}
.search-results{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border);border-top:none;max-height:400px;overflow-y:auto;z-index:500;display:none;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.search-results.visible{display:block}
.search-result-item{padding:14px 24px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;display:flex;gap:12px;align-items:center}
.search-result-item:hover{background:var(--surface2)}
.search-result-icon{width:36px;height:36px;border-radius:8px;background:var(--gold-soft);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.search-result-icon.food-icon{background:var(--sakura-soft);color:var(--sakura)}
.search-result-icon.area-icon{background:rgba(100,180,255,.12);color:#64b4ff}
.search-result-info{flex:1;min-width:0}
.search-result-name{font-weight:500;font-size:14px;margin-bottom:2px}
.search-result-addr{color:var(--text-muted);font-size:12px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-result-type{color:var(--gold);font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.search-result-add{padding:6px 12px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:11px;font-weight:500;white-space:nowrap;flex-shrink:0;transition:background .15s}
.search-result-add:hover{background:#c0392b}
.search-loading,.search-empty{padding:20px 24px;color:var(--text-muted);font-size:13px;text-align:center}
.stations-list{flex:1;overflow-y:auto;padding:0;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.day-header{padding:20px 24px 12px;display:flex;justify-content:space-between;align-items:center}
.day-header h2{font-family:'Playfair Display',serif;font-size:20px;font-weight:700}
.day-header .day-date{color:var(--text-muted);font-size:12px;letter-spacing:1px}
.day-note{padding:0 24px 16px;color:var(--text-muted);font-size:13px;font-style:italic;line-height:1.5}
.station-card{padding:16px 24px;border-bottom:1px solid var(--border);cursor:grab;transition:background .15s;display:flex;gap:14px;align-items:flex-start}
.station-card:hover{background:var(--surface)}
.station-card.dragging{opacity:.4;background:var(--accent-soft)}
.station-card.drag-over-card{border-top:2px solid var(--accent)}
.station-card.active-station{background:var(--accent-soft);border-left:3px solid var(--accent)}
.station-number{width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:2px}
.station-info{flex:1;min-width:0}
.station-name{font-weight:500;font-size:14px;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.type-badge{font-size:10px;padding:2px 6px;border-radius:3px;font-weight:400;text-transform:uppercase;letter-spacing:.5px}
.type-badge.sight{background:var(--gold-soft);color:var(--gold)}
.type-badge.food{background:var(--sakura-soft);color:var(--sakura)}
.type-badge.area{background:rgba(100,180,255,.12);color:#64b4ff}
.type-badge.transport{background:rgba(100,200,150,.12);color:#64c896}
.station-time{color:var(--text-muted);font-size:12px;margin-bottom:4px}
.station-note{color:var(--text-muted);font-size:12px;line-height:1.4}
.station-actions{display:flex;gap:4px;flex-shrink:0;opacity:0;transition:opacity .15s}
.station-card:hover .station-actions{opacity:1}
.station-actions button{background:none;border:1px solid var(--border);color:var(--text-muted);width:28px;height:28px;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s}
.station-actions button:hover{background:var(--surface2);color:var(--text);border-color:var(--text-muted)}
.station-actions button.delete:hover{background:var(--accent-soft);color:var(--accent);border-color:var(--accent)}
.map-container{flex:1;position:relative}
#map{width:100%;height:100%}
.custom-marker{background:var(--accent);color:#fff;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.4);border:2px solid #fff}
.custom-marker.food-marker{background:var(--sakura)}
.custom-marker.area-marker{background:#64b4ff}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:2000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px;width:500px;max-width:92vw;max-height:85vh;overflow-y:auto}
.modal h3{font-family:'Playfair Display',serif;font-size:18px;margin-bottom:20px}
.modal label{display:block;font-size:12px;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.modal input,.modal select,.modal textarea{width:100%;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;margin-bottom:16px;outline:none;transition:border-color .15s}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--accent)}
.modal textarea{resize:vertical;min-height:60px}
.modal-buttons{display:flex;gap:8px;justify-content:flex-end;margin-top:8px}
.modal-buttons button{padding:10px 20px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;border:1px solid var(--border);transition:all .15s}
.btn-cancel{background:transparent;color:var(--text-muted)}
.btn-cancel:hover{background:var(--surface2);color:var(--text)}
.btn-save{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-save:hover{background:#c0392b}
.btn-delete-modal{background:transparent;color:var(--accent);border-color:var(--accent);margin-right:auto}
.btn-delete-modal:hover{background:var(--accent-soft)}
.export-bar{padding:12px 24px;border-top:1px solid var(--border);background:var(--surface);display:flex;gap:8px;align-items:center}
.export-bar button{padding:8px 16px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;border:1px solid var(--border);background:transparent;color:var(--text-muted);transition:all .15s}
.export-bar button:hover{background:var(--surface2);color:var(--text)}
.export-bar .add-btn{background:var(--accent);color:#fff;border-color:var(--accent)}
.export-bar .add-btn:hover{background:#c0392b}
.toast{position:fixed;bottom:24px;right:24px;background:#27ae60;color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:3000;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.4)}
.toast.visible{opacity:1;transform:translateY(0)}
.leaflet-popup-content-wrapper{background:var(--surface)!important;color:var(--text)!important;border-radius:8px!important;box-shadow:0 4px 20px rgba(0,0,0,.5)!important}
.leaflet-popup-content{margin:12px 16px!important;font-family:'Noto Sans JP',sans-serif!important;font-size:13px!important}
.leaflet-popup-tip{background:var(--surface)!important}
.popup-title{font-weight:700;font-size:14px;margin-bottom:4px}
.popup-time{color:var(--gold);font-size:12px}
.popup-note{color:var(--text-muted);font-size:12px;margin-top:4px}
@media(max-width:768px){.app-layout{flex-direction:column}.sidebar{width:100%;min-width:100%;height:55vh}.map-container{height:45vh}.header{padding:16px}.logo{font-size:18px}.header-dates{display:none}}
</style>
</head>

var searchData=[];
async function searchPlaces(q){
  var r=document.getElementById('searchResults');
  r.innerHTML='<div class="search-loading">Suche l\u00e4uft...</div>';
  r.classList.add('visible');
  try{
    var resp=await fetch('https://nominatim.openstreetmap.org/search?format=json&q='+encodeURIComponent(q+' Japan')+'&limit=8&addressdetails=1&namedetails=1&accept-language=de',{headers:{'User-Agent':'JapanTrip/1.0'}});
    var data=await resp.json();
    if(data.length===0){
      var resp2=await fetch('https://nominatim.openstreetmap.org/search?format=json&q='+encodeURIComponent(q)+'&limit=8&addressdetails=1&namedetails=1&accept-language=de',{headers:{'User-Agent':'JapanTrip/1.0'}});
      data=await resp2.json();
    }
    searchData=data;
    if(data.length===0){r.innerHTML='<div class="search-empty">Keine Ergebnisse.</div>';return}
    r.innerHTML=data.map(function(item,i){
      var pt=classifyPlace(item);
      var ic=pt==='food'?'food-icon':pt==='area'?'area-icon':'';
      var sym=pt==='food'?'&#127860;':pt==='sight'?'&#9961;':pt==='transport'?'&#128651;':'&#128205;';
      var tl=pt==='food'?'Essen':pt==='sight'?'Sight':pt==='transport'?'Transport':'Gegend';
      var nm=item.namedetails&&item.namedetails.name?item.namedetails.name:item.display_name.split(',')[0].trim();
      var ad=item.display_name.split(',').slice(1,4).join(',').trim();
      return '<div class="search-result-item" onclick="addSearchResult('+i+')"><div class="search-result-icon '+ic+'">'+sym+'</div><div class="search-result-info"><div class="search-result-name">'+nm+'</div><div class="search-result-addr">'+ad+'</div><div class="search-result-type">'+tl+'</div></div><button class="search-result-add" onclick="event.stopPropagation();addSearchResult('+i+')">+ Tag '+(activeDay+1)+'</button></div>';
    }).join('');
  }catch(e){r.innerHTML='<div class="search-empty">Fehler. Bitte erneut versuchen.</div>'}
}

function classifyPlace(item){
  var t=(item.type||'').toLowerCase(),c=(item.class||'').toLowerCase();
  if(['restaurant','cafe','fast_food','bar','pub','bakery','ice_cream'].indexOf(t)>=0)return 'food';
  if(c==='amenity'&&['restaurant','cafe','bar','pub','fast_food'].indexOf(t)>=0)return 'food';
  if(['temple','shrine','museum','castle','monument','memorial','viewpoint','attraction','theme_park','zoo','garden'].indexOf(t)>=0)return 'sight';
  if(c==='tourism'||c==='historic')return 'sight';
  if(['station','bus_stop','aerodrome','airport'].indexOf(t)>=0)return 'transport';
  if(c==='railway'||c==='aeroway')return 'transport';
  return 'area';
}

function addSearchResult(i){
  var item=searchData[i];if(!item)return;
  var pt=classifyPlace(item);
  var nm=item.namedetails&&item.namedetails.name?item.namedetails.name:item.display_name.split(',')[0].trim();
  state.days[activeDay].stations.push({id:'s'+Date.now(),name:nm,time:'',type:pt,lat:parseFloat(item.lat),lng:parseFloat(item.lon),note:item.display_name.split(',').slice(1,3).join(',').trim()});
  saveState();render();
  document.getElementById('searchResults').classList.remove('visible');
  document.getElementById('searchInput').value='';
  showToast('\u2713 '+nm+' zu Tag '+(activeDay+1)+' hinzugef\u00fcgt');
}

// MAP
function initMap(){
  map=L.map('map',{zoomControl:true,attributionControl:false}).setView([35.6812,139.7671],12);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);
  markersLayer=L.layerGroup().addTo(map);routeLayer=L.layerGroup().addTo(map);renderMap();
}
function renderMap(){
  markersLayer.clearLayers();routeLayer.clearLayers();
  var day=state.days[activeDay];if(!day)return;var coords=[];
  day.stations.forEach(function(s,i){
    if(!s.lat||!s.lng)return;
    var mc=s.type==='food'?'food-marker':s.type==='area'?'area-marker':'';
    var icon=L.divIcon({className:'',html:'<div class="custom-marker '+mc+'">'+(i+1)+'</div>',iconSize:[28,28],iconAnchor:[14,14]});
    L.marker([s.lat,s.lng],{icon:icon}).bindPopup('<div class="popup-title">'+s.name+'</div><div class="popup-time">'+(s.time||'')+'</div><div class="popup-note">'+(s.note||'')+'</div>').on('click',function(){activeStation=s.id;renderStations()}).addTo(markersLayer);
    coords.push([s.lat,s.lng]);
  });
  if(coords.length>1)L.polyline(coords,{color:'#e74c3c',weight:2,opacity:.5,dashArray:'8 6'}).addTo(routeLayer);
  if(coords.length>0)map.fitBounds(coords,{padding:[60,60],maxZoom:14});
}

// RENDER
function renderDayTabs(){
  document.getElementById('dayTabs').innerHTML=state.days.map(function(d,i){
    return '<div class="day-tab '+(i===activeDay?'active':'')+'" draggable="true" ondragstart="onDayDragStart(event,'+i+')" ondragover="onDayDragOver(event,'+i+')" ondragleave="onDayDragLeave(event)" ondrop="onDayDrop(event,'+i+')" onclick="selectDay('+i+')">Tag '+(i+1)+'</div>';
  }).join('');
}
function renderStations(){
  var list=document.getElementById('stationsList'),day=state.days[activeDay];
  if(!day){list.innerHTML='';return}
  var h='<div class="day-header"><h2>'+day.title+'</h2><span class="day-date">'+day.date+' \u00b7 '+day.city+'</span></div>';
  if(day.note)h+='<div class="day-note">'+day.note+'</div>';
  day.stations.forEach(function(s,i){
    var tl=s.type==='sight'?'Sight':s.type==='food'?'Food':s.type==='transport'?'Transfer':'Area';
    var ac=activeStation===s.id?' active-station':'';
    h+='<div class="station-card'+ac+'" draggable="true" ondragstart="onStationDragStart(event,'+i+')" ondragover="onStationDragOver(event,'+i+')" ondragleave="onStationDragLeave(event)" ondrop="onStationDrop(event,'+i+')" onclick="focusStation(\''+s.id+'\','+s.lat+','+s.lng+')"><div class="station-number">'+(i+1)+'</div><div class="station-info"><div class="station-name">'+s.name+' <span class="type-badge '+s.type+'">'+tl+'</span></div>'+(s.time?'<div class="station-time">\u23f0 '+s.time+'</div>':'')+(s.note?'<div class="station-note">'+s.note+'</div>':'')+'</div><div class="station-actions"><button onclick="event.stopPropagation();editStation('+i+')" title="Bearbeiten">\u270e</button><button class="delete" onclick="event.stopPropagation();deleteStation('+i+')" title="L\u00f6schen">\u00d7</button></div></div>';
  });
  list.innerHTML=h;
}
function render(){renderDayTabs();renderStations();renderMap()}
function selectDay(i){activeDay=i;activeStation=null;render()}
function focusStation(id,lat,lng){
  activeStation=id;renderStations();
  if(lat&&lng){map.setView([lat,lng],15,{animate:true});markersLayer.eachLayer(function(m){var p=m.getLatLng();if(Math.abs(p.lat-lat)<.0001&&Math.abs(p.lng-lng)<.0001)m.openPopup()})}
}

// DAY DRAG
var dragDayIndex=null;
function onDayDragStart(e,i){dragDayIndex=i;e.dataTransfer.effectAllowed='move';e.target.classList.add('dragging')}
function onDayDragOver(e,i){e.preventDefault();document.querySelectorAll('.day-tab').forEach(function(t){t.classList.remove('drag-over')});e.currentTarget.classList.add('drag-over')}
function onDayDragLeave(e){e.currentTarget.classList.remove('drag-over')}
function onDayDrop(e,t){e.preventDefault();document.querySelectorAll('.day-tab').forEach(function(el){el.classList.remove('dragging','drag-over')});if(dragDayIndex===null||dragDayIndex===t)return;var m=state.days.splice(dragDayIndex,1)[0];state.days.splice(t,0,m);activeDay=t;dragDayIndex=null;saveState();render()}

// STATION DRAG
var dragStationIndex=null;
function onStationDragStart(e,i){dragStationIndex=i;e.dataTransfer.effectAllowed='move';e.currentTarget.classList.add('dragging')}
function onStationDragOver(e,i){e.preventDefault();document.querySelectorAll('.station-card').forEach(function(c){c.classList.remove('drag-over-card')});e.currentTarget.classList.add('drag-over-card')}
function onStationDragLeave(e){e.currentTarget.classList.remove('drag-over-card')}
function onStationDrop(e,t){e.preventDefault();document.querySelectorAll('.station-card').forEach(function(c){c.classList.remove('dragging','drag-over-card')});if(dragStationIndex===null||dragStationIndex===t)return;var day=state.days[activeDay],m=day.stations.splice(dragStationIndex,1)[0];day.stations.splice(t,0,m);dragStationIndex=null;saveState();render()}

// MODAL
function showModal(h){document.getElementById('modal').innerHTML=h;document.getElementById('modalOverlay').style.display='flex'}
function hideModal(){document.getElementById('modalOverlay').style.display='none'}
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===e.currentTarget)hideModal()});

function editStation(index){
  var s=state.days[activeDay].stations[index];
  var opts=state.days.map(function(d,i){return '<option value="'+i+'"'+(i===activeDay?' disabled':'')+'>Tag '+(i+1)+': '+d.title+'</option>'}).join('');
  showModal('<h3>Station bearbeiten</h3><label>Name</label><input id="editName" value="'+s.name+'"><label>Uhrzeit</label><input id="editTime" value="'+(s.time||'')+'"><label>Typ</label><select id="editType"><option value="sight"'+(s.type==='sight'?' selected':'')+'>Sehensw\u00fcrdigkeit</option><option value="food"'+(s.type==='food'?' selected':'')+'>Essen</option><option value="area"'+(s.type==='area'?' selected':'')+'>Gegend</option><option value="transport"'+(s.type==='transport'?' selected':'')+'>Transport</option></select><label>Breitengrad</label><input id="editLat" type="number" step="0.0001" value="'+(s.lat||'')+'"><label>L\u00e4ngengrad</label><input id="editLng" type="number" step="0.0001" value="'+(s.lng||'')+'"><label>Notiz</label><textarea id="editNote">'+(s.note||'')+'</textarea><label>In Tag verschieben</label><select id="editMoveDay"><option value="">\u2014 Nicht verschieben \u2014</option>'+opts+'</select><div class="modal-buttons"><button class="btn-delete-modal" onclick="deleteStation('+index+');hideModal()">L\u00f6schen</button><button class="btn-cancel" onclick="hideModal()">Abbrechen</button><button class="btn-save" onclick="saveEditStation('+index+')">Speichern</button></div>');
}
function saveEditStation(i){
  var s=state.days[activeDay].stations[i];
  s.name=document.getElementById('editName').value;s.time=document.getElementById('editTime').value;
  s.type=document.getElementById('editType').value;s.lat=parseFloat(document.getElementById('editLat').value)||s.lat;
  s.lng=parseFloat(document.getElementById('editLng').value)||s.lng;s.note=document.getElementById('editNote').value;
  var mv=document.getElementById('editMoveDay').value;
  if(mv!==''){state.days[activeDay].stations.splice(i,1);state.days[parseInt(mv)].stations.push(s)}
  hideModal();saveState();render();
}
function deleteStation(i){if(!confirm('Station l\u00f6schen?'))return;state.days[activeDay].stations.splice(i,1);saveState();render()}

document.getElementById('addStationBtn').addEventListener('click',function(){
  showModal('<h3>Neue Station</h3><label>Name</label><input id="addName" placeholder="z.B. TeamLab Borderless"><label>Uhrzeit</label><input id="addTime" placeholder="z.B. 14:00"><label>Typ</label><select id="addType"><option value="sight">Sehensw\u00fcrdigkeit</option><option value="food">Essen</option><option value="area">Gegend</option><option value="transport">Transport</option></select><label>Breitengrad</label><input id="addLat" type="number" step="0.0001" placeholder="35.6812"><label>L\u00e4ngengrad</label><input id="addLng" type="number" step="0.0001" placeholder="139.7671"><label>Notiz</label><textarea id="addNote" placeholder="Tipps..."></textarea><div class="modal-buttons"><button class="btn-cancel" onclick="hideModal()">Abbrechen</button><button class="btn-save" onclick="addManualStation()">Hinzuf\u00fcgen</button></div>');
});
function addManualStation(){
  var n=document.getElementById('addName').value.trim();if(!n)return alert('Name fehlt.');
  state.days[activeDay].stations.push({id:'s'+Date.now(),name:n,time:document.getElementById('addTime').value,type:document.getElementById('addType').value,lat:parseFloat(document.getElementById('addLat').value)||0,lng:parseFloat(document.getElementById('addLng').value)||0,note:document.getElementById('addNote').value});
  hideModal();saveState();render();showToast('\u2713 '+n+' hinzugef\u00fcgt');
}

// SEARCH LISTENERS
document.getElementById('searchBtn').addEventListener('click',function(){var q=document.getElementById('searchInput').value.trim();if(q.length>=2)searchPlaces(q)});
document.getElementById('searchInput').addEventListener('keydown',function(e){if(e.key==='Enter'){var q=e.target.value.trim();if(q.length>=2)searchPlaces(q)}if(e.key==='Escape')document.getElementById('searchResults').classList.remove('visible')});
document.getElementById('searchInput').addEventListener('input',function(e){clearTimeout(searchTimeout);var q=e.target.value.trim();if(q.length<3){document.getElementById('searchResults').classList.remove('visible');return}searchTimeout=setTimeout(function(){searchPlaces(q)},600)});
document.addEventListener('click',function(e){if(!e.target.closest('.search-bar'))document.getElementById('searchResults').classList.remove('visible')});

// EXPORT/IMPORT
document.getElementById('exportBtn').addEventListener('click',function(){var b=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='japan-2026-trip.json';a.click()});
document.getElementById('importBtn').addEventListener('click',function(){document.getElementById('importFile').click()});
document.getElementById('importFile').addEventListener('change',function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{var d=JSON.parse(ev.target.result);if(d.days){state=d;activeDay=0;saveState();render();showToast('Trip importiert!')}}catch(err){alert('Ung\u00fcltige JSON.')}};r.readAsText(f);e.target.value=''});

// KEYBOARD
document.addEventListener('keydown',function(e){if(e.key==='Escape')hideModal();if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;if(e.key==='ArrowLeft'&&activeDay>0)selectDay(activeDay-1);if(e.key==='ArrowRight'&&activeDay<state.days.length-1)selectDay(activeDay+1)});

// INIT
initMap();render();
</script>
</body>
</html>
